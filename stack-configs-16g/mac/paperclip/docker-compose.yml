# ============================================
# PAPERCLIP — Orchestrateur d'agents IA (Mac)
# Coordonne Ollama + Mem0
# ============================================

services:
  paperclip:
    image: ghcr.io/papeeria/paperclip:latest
    container_name: paperclip
    restart: unless-stopped
    ports:
      - "8060:8060"
    volumes:
      - paperclip_data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MEM0_URL: http://host.docker.internal:8050
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  paperclip_data:
