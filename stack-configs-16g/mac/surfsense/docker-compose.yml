# ============================================
# SURFSENSE — Moteur de recherche personnel (Mac)
# Connecté à Chroma + Ollama local
# ============================================

services:
  surfsense:
    image: ghcr.io/mot/surfsense:latest
    container_name: surfsense
    restart: unless-stopped
    ports:
      - "3007:3000"
    volumes:
      - surfsense_data:/app/data
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_HOST: host.docker.internal
      CHROMA_PORT: 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  surfsense_data:
