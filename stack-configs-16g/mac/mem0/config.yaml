# ============================================
# MEM0 — Configuration
# Memoire partagee entre LobeChat, SiYuan,
# Paperclip, n8n
# ============================================

vector_store:
  provider: chroma
  config:
    host: host.docker.internal
    port: 8000
    collection_name: mem0

graph_store:
  provider: kuzu
  config:
    url: /app/data/kuzu_db

llm:
  provider: ollama
  config:
    model: qwen3:8b
    ollama_base_url: http://host.docker.internal:11434

embedder:
  provider: ollama
  config:
    model: nomic-embed-text
    ollama_base_url: http://host.docker.internal:11434
