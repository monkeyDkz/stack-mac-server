# ============================================
# MEM0 — Configuration TEST (tinyllama)
# Pour MacBook M1 16 Go — modele leger
# ============================================

vector_store:
  provider: chroma
  config:
    host: host.docker.internal
    port: 8000
    collection_name: mem0

llm:
  provider: ollama
  config:
    model: tinyllama
    base_url: http://host.docker.internal:11434

embedder:
  provider: ollama
  config:
    model: nomic-embed-text
    base_url: http://host.docker.internal:11434
