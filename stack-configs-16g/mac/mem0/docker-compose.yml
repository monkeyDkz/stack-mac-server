# ============================================
# MEM0 — Mémoire persistante IA (Mac)
# Connecté à Chroma + Ollama
# Build local (pas d'image Docker Hub)
# ============================================

services:
  mem0:
    build: .
    container_name: mem0
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      - mem0_data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      MEM0_CONFIG: /app/config.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mem0_data:
