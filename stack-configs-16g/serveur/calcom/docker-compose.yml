# ============================================
# STACK CAL.COM — Scheduling
# Utilise PostgreSQL + Redis partagés (stack core)
# ============================================

services:
  calcom:
    image: calcom/cal.com:latest
    container_name: calcom
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://calcom:${CALCOM_DB_PASSWORD}@postgres:5432/calcom_db
      NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET:?Set CALCOM_NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY:?Set CALCOM_ENCRYPTION_KEY}
      NEXT_PUBLIC_WEBAPP_URL: https://cal.home
      NEXTAUTH_URL: https://cal.home
      # Email via BillionMail
      EMAIL_SERVER_HOST: billionmail
      EMAIL_SERVER_PORT: "587"
      EMAIL_SERVER_USER: calcom@yourdomain.com
      EMAIL_SERVER_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: noreply@yourdomain.com
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - stack-network

networks:
  stack-network:
    external: true
