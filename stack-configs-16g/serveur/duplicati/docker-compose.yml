# ============================================
# STACK DUPLICATI — Backups chiffrés
# ============================================

services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - duplicati_config:/config
      # Sources à sauvegarder
      - /opt/stacks:/source/stacks:ro
      - /var/lib/docker/volumes:/source/docker-volumes:ro
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Paris
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8200 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - stack-network

volumes:
  duplicati_config:

networks:
  stack-network:
    external: true
