# ============================================
# STACK MONITORING — Uptime Kuma + Oak
# ============================================

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - stack-network

  oak:
    image: ghcr.io/bert-mccutchen/oak:latest
    container_name: oak
    restart: unless-stopped
    ports:
      - "3004:80"
    volumes:
      - oak_data:/rails/storage
    networks:
      - stack-network

volumes:
  uptime-kuma_data:
  oak_data:

networks:
  stack-network:
    external: true
