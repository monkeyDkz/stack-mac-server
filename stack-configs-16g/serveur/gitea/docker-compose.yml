# ============================================
# STACK GITEA — Git self-hosted
# Utilise PostgreSQL partagé (stack core)
# ============================================

services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea_db
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=${GITEA_DB_PASSWORD:?Set GITEA_DB_PASSWORD}
      - GITEA__server__ROOT_URL=https://gitea.home
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__SSH_DOMAIN=gitea.home
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__webhook__DELIVER_TIMEOUT=10
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__mailer__ENABLED=true
      - GITEA__mailer__PROTOCOL=smtp+starttls
      - GITEA__mailer__SMTP_ADDR=billionmail
      - GITEA__mailer__SMTP_PORT=587
      - GITEA__mailer__FROM=gitea@yourdomain.com
      - GITEA__mailer__USER=gitea@yourdomain.com
      - GITEA__mailer__PASSWD=${SMTP_PASSWORD}
      - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY:?Set GITEA_SECRET_KEY}
      - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN:?Set GITEA_INTERNAL_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - stack-network

volumes:
  gitea_data:
    driver: local

networks:
  stack-network:
    external: true
